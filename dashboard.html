<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windhelm Guard Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --event-eval: #8b5cf6;
            --event-sent: #10b981;
            --event-style: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }
        .date-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .date-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
        }
        .date-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }
        .date-item.active {
            background-color: var(--accent);
            color: white;
            font-weight: 600;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats {
            display: flex;
            gap: 20px;
        }
        .stat-badge {
            background: rgba(255,255,255,0.05);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .timeline {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .log-entry {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }
        .log-entry:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .log-type {
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .type-MESSAGE_EVALUATION { background: rgba(139, 92, 246, 0.2); color: var(--event-eval); border: 1px solid rgba(139, 92, 246, 0.3); }
        .type-MESSAGE_SENT { background: rgba(16, 185, 129, 0.2); color: var(--event-sent); border: 1px solid rgba(16, 185, 129, 0.3); }
        .type-STYLE_ANALYSIS { background: rgba(245, 158, 11, 0.2); color: var(--event-style); border: 1px solid rgba(245, 158, 11, 0.3); }
        
        .log-time { color: var(--text-muted); }
        .log-content h4 { margin-top: 15px; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .code-block {
            background: #0b1120;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a5b4fc;
            overflow-x: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }
        .decision {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .decision.true { background: rgba(16, 185, 129, 0.2); color: var(--event-sent); }
        .decision.false { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            Windhelm Guard Dashboard
        </div>
        <div class="date-list" id="dateList">
            <!-- Dates loaded here -->
        </div>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h2 id="currentDateTitle">Select a date</h2>
            <div class="stats" id="statsContainer">
                <!-- Stats loaded here -->
            </div>
        </div>
        <div class="timeline" id="timelineContainer">
            <div class="empty-state">
                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <p>Loading data...</p>
            </div>
        </div>
    </div>

    <script>
        async function fetchDates() {
            try {
                const res = await fetch('/api/dates');
                const dates = await res.json();
                const dateList = document.getElementById('dateList');
                dateList.innerHTML = '';
                
                if (dates.length === 0) {
                    dateList.innerHTML = '<div style="padding: 15px; color: var(--text-muted);">No logs found.</div>';
                    document.querySelector('.empty-state p').innerText = "No logs generated yet.";
                    return;
                }

                dates.forEach((date, index) => {
                    const el = document.createElement('div');
                    el.className = `date-item ${index === 0 ? 'active' : ''}`;
                    el.innerText = date;
                    el.onclick = () => {
                        document.querySelectorAll('.date-item').forEach(d => d.classList.remove('active'));
                        el.classList.add('active');
                        fetchLogs(date);
                    };
                    dateList.appendChild(el);
                });
                
                // Load latest by default
                fetchLogs(dates[0]);
            } catch (err) {
                console.error(err);
                document.querySelector('.empty-state p').innerText = "Failed to connect to bot server.";
            }
        }

        async function fetchLogs(date) {
            document.getElementById('currentDateTitle').innerText = date;
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '<div class="empty-state"><p>Loading logs...</p></div>';
            
            try {
                const res = await fetch(`/api/logs?date=${date}`);
                const logs = await res.json();
                
                if (logs.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No activity recorded on this date.</p></div>';
                    return;
                }
                
                renderLogs(logs);
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="empty-state"><p>Error loading logs.</p></div>';
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';
            
            let evalCount = 0;
            let sentCount = 0;
            
            logs.forEach(log => {
                const el = document.createElement('div');
                el.className = 'log-entry';
                
                let contentHtml = '';
                const d = log.details;
                
                if (log.event_type === 'MESSAGE_EVALUATION') {
                    evalCount++;
                    contentHtml = `
                        <h4>Channel</h4>
                        <div style="color: white; margin-bottom: 10px;">${d.channel_info}</div>
                        <h4>Trigger Message</h4>
                        <div class="code-block" style="color: #cbd5e1;">${d.message_content}</div>
                        <h4>Thinking Process (LLM Reason)</h4>
                        <div class="code-block" style="color: #34d399;">${d.reasoning || 'N/A'}</div>
                        <div class="decision ${d.should_reply}">Decision: ${d.should_reply ? 'REPLY' : 'IGNORE'}</div>
                        ${d.should_reply ? `<h4>Generated Reply</h4><div class="code-block" style="color: white; border-color: var(--event-sent);">${d.reply_content}</div>` : ''}
                    `;
                } else if (log.event_type === 'STYLE_ANALYSIS') {
                    contentHtml = `
                        <h4>Channel Analysed</h4>
                        <div style="color: white; margin-bottom: 10px;">${d.channel_name}</div>
                        <h4>Generated Profile</h4>
                        <div class="code-block">${JSON.stringify(d.profile, null, 2)}</div>
                    `;
                } else if (log.event_type === 'MESSAGE_SENT') {
                    sentCount++;
                    contentHtml = `
                        <h4>Channel</h4>
                        <div style="color: white; margin-bottom: 10px;">${d.channel_info}</div>
                        <h4>Content Sent</h4>
                        <div class="code-block" style="color: white; border-color: var(--event-sent);">${d.content}</div>
                    `;
                }
                
                el.innerHTML = `
                    <div class="log-header">
                        <span class="log-type type-${log.event_type}">${log.event_type.replace('_', ' ')}</span>
                        <span class="log-time">${log.timestamp.split(' ')[1]}</span>
                    </div>
                    <div class="log-content">
                        ${contentHtml}
                    </div>
                `;
                container.appendChild(el);
            });
            
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-badge">${evalCount} Evaluations</div>
                <div class="stat-badge">${sentCount} Messages Sent</div>
                <div class="stat-badge">${logs.length} Total Events</div>
            `;
            
            // Auto scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        // Initialize
        fetchDates();
        
        // Refresh every 10 seconds
        setInterval(() => {
            const activeDate = document.querySelector('.date-item.active');
            if (activeDate) {
                // To avoid scrolling up, maybe only fetch if at bottom, but simple refresh is fine for now
                // fetchLogs(activeDate.innerText);
            }
        }, 10000);
    </script>
</body>
</html>
